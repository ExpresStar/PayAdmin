  <script>
    const sb = window.supabaseClient;
    const ADMIN_ID = sessionStorage.getItem("adminId");
    const ADMIN_EMAIL = sessionStorage.getItem("_admin_email");

    // ===== PAGE NAVIGATION =====
    function switchPage(pageName) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".menu-link").forEach(l => l.classList.remove("active"));
      document.getElementById(pageName).classList.add("active");
      document.querySelector(`a[onclick="switchPage('${pageName}')"]`).classList.add("active");

      if (pageName === "dashboard") loadDashboard();
      if (pageName === "workers") loadWorkers();
      if (pageName === "bots") loadBots();
      if (pageName === "transactions") loadTransactions();
      if (pageName === "shifts") loadShiftSwaps();
    }

    // ===== LOGOUT =====
    function logout() {
      if (confirm("确定要登出？")) {
        sessionStorage.clear();
        window.location.href = "/admin-login.html";
      }
    }

    // ===== DASHBOARD =====
    async function loadDashboard() {
      try {
        const { count: workerCount } = await sb
          .from("workers")
          .select("*", { count: "exact" });

        const { count: botCount } = await sb
          .from("bot_instances")
          .select("*", { count: "exact" })
          .eq("status", "running");

        document.getElementById("statWorkers").textContent = workerCount || 0;
        document.getElementById("statBots").textContent = botCount || 0;
        document.getElementById("statTxToday").textContent = "计算中...";
        document.getElementById("statUptime").textContent = "99.8%";
      } catch (err) {
        console.error("Dashboard error:", err);
      }
    }

    // ===== MODAL FUNCTIONS =====
    function openAddWorkerModal() {
      document.getElementById("addWorkerModal").classList.add("active");
    }

    function closeAddWorkerModal() {
      document.getElementById("addWorkerModal").classList.remove("active");
      document.getElementById("workerName").value = "";
      document.getElementById("workerUserId").value = "";
    }

    function openShiftSwapModal() {
      document.getElementById("shiftSwapModal").classList.add("active");
      loadWorkerSelects();
    }

    function closeShiftSwapModal() {
      document.getElementById("shiftSwapModal").classList.remove("active");
    }
