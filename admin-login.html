<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>933Pay - Login Admin</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1f2e url('assets/logo&background933pay/bg.png') center / cover no-repeat;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 30px 24px;
      width: 360px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .login-logo-img {
      width: 110px;
      align-self: center;
      margin-bottom: 8px;
    }
    .login-subtitle-line {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      width: 100%;
    }
    .login-subtitle-line::before,
    .login-subtitle-line::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .login-subtitle-line span {
      padding: 0 10px;
      font-size: 10px;
      color: #64748b;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .alert {
      display: none;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 12px;
      text-align: center;
    }
    .alert.show {
      display: block;
    }
    .err {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
    .ok {
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    .form-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      pointer-events: none;
    }
    .input-wrapper input {
      width: 100%;
      padding: 10px 10px 10px 36px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
      background: #f8fafc;
    }
    .input-wrapper input:focus {
      border-color: #0c55ea;
      background: white;
      box-shadow: 0 0 0 3px rgba(12, 85, 234, 0.12);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0c55ea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 6px;
      box-shadow: 0 4px 12px rgba(12, 85, 234, 0.2);
    }
    button:hover {
      background: #0043c7;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(12, 85, 234, 0.3);
    }
    button:active {
      transform: translateY(0);
    }
    .hint {
      font-size: 10px;
      color: #94a3b8;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
      font-weight: 500;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="assets/logo&background933pay/1.png" alt="Logo" class="login-logo-img">
    <div class="login-subtitle-line">
      <span>财务管理系统</span>
    </div>
    <div id="msg" class="alert"></div>
    <div class="form-group">
      <label>用户名</label>
      <div class="input-wrapper">
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input id="email" type="email" placeholder="请输入用户名" autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="input-wrapper">
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
    </div>
    <button onclick="login()">登录</button>
    <div class="hint">Akun MVP:<br>baobei908@933pay.local / bobi908<br>operator908@933pay.local / bobi908</div>
  </div>
  <script>
    function show(msg,type){const e=document.getElementById('msg');e.className='alert show '+(type==='ok'?'ok':'err');e.textContent=msg}
    function login(){
      const email=document.getElementById('email').value.trim().toLowerCase();
      const password=document.getElementById('password').value;
      const admins={"baobei908@933pay.local":"bobi908","operator908@933pay.local":"bobi908"};
      if(admins[email]!==password){show('Email atau password salah.','err');return}
      sessionStorage.setItem('adminLoggedIn','true');
      sessionStorage.setItem('adminId',email);
      sessionStorage.setItem('_admin_email',email);
      show('Login berhasil. Membuka dashboard...','ok');
      setTimeout(()=>location.href='/admin.html',400);
    }
    document.addEventListener('keydown',e=>{if(e.key==='Enter')login()});
    if(sessionStorage.getItem('adminLoggedIn')==='true') location.href='/admin.html';
  </script>
</body>
</html>
