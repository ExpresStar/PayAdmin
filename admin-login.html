<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>933Pay - Login Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#2563eb,#7c3aed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.box{background:#fff;width:100%;max-width:410px;border-radius:16px;padding:34px;box-shadow:0 18px 50px rgba(0,0,0,.25)}h1{text-align:center;margin-bottom:8px;color:#111827}.sub{text-align:center;color:#6b7280;margin-bottom:26px}.group{margin-bottom:16px}label{display:block;margin-bottom:7px;font-weight:700;color:#374151}input{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:9px;font-size:15px}input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}button{width:100%;padding:13px;border:0;border-radius:9px;background:#2563eb;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px}button:hover{background:#1d4ed8}.alert{display:none;padding:12px;border-radius:9px;margin-bottom:14px;font-size:14px}.alert.show{display:block}.err{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.hint{font-size:12px;color:#6b7280;text-align:center;margin-top:14px;line-height:1.5}.brand{font-size:38px;text-align:center;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">🛡️</div>
    <h1>933Pay Admin</h1>
    <div class="sub">Masuk ke dashboard operasional</div>
    <div id="msg" class="alert"></div>
    <div class="group"><label>Email</label><input id="email" type="email" placeholder="baobei908@933pay.local" autocomplete="username"></div>
    <div class="group"><label>Password</label><input id="password" type="password" placeholder="Masukkan password" autocomplete="current-password"></div>
    <button onclick="login()">Masuk</button>
    <div class="hint">Akun MVP:<br>baobei908@933pay.local / bobi908<br>operator908@933pay.local / bobi908</div>
  </div>
  <script>
    function show(msg,type){const e=document.getElementById('msg');e.className='alert show '+(type==='ok'?'ok':'err');e.textContent=msg}
    function login(){
      const email=document.getElementById('email').value.trim().toLowerCase();
      const password=document.getElementById('password').value;
      const admins={"baobei908@933pay.local":"bobi908","operator908@933pay.local":"bobi908"};
      if(admins[email]!==password){show('Email atau password salah.','err');return}
      sessionStorage.setItem('adminLoggedIn','true');
      sessionStorage.setItem('adminId',email);
      sessionStorage.setItem('_admin_email',email);
      show('Login berhasil. Membuka dashboard...','ok');
      setTimeout(()=>location.href='/admin.html',400);
    }
    document.addEventListener('keydown',e=>{if(e.key==='Enter')login()});
    if(sessionStorage.getItem('adminLoggedIn')==='true') location.href='/admin.html';
  </script>
</body>
</html>
